services:
  - type: web
    name: sikha-work-assistant
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./work_assistant.db
      - key: FILE_STORAGE_PATH
        value: ./storage
      - key: ASSISTANT_ENABLE_CLOUD_REASONER
        value: false
      - key: ASSISTANT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
