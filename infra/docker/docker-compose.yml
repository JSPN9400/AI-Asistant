version: "3.9"

services:
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
    environment:
      ASSISTANT_API_KEY: replace-in-prod
      DATABASE_URL: sqlite:///./work_assistant.db
    ports:
      - "8000:8000"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
